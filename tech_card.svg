<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="60%" stop-color="#111b27"/><stop offset="100%" stop-color="#0a2330"/>
    </linearGradient>
    <radialGradient id="glow" cx="90%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.28"/><stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb6a8"/><stop offset="100%" stop-color="#56c6ff"/>
    </linearGradient>
  </defs>

  <rect width="880" height="300" rx="14" fill="url(#bg)"/>
  <rect width="880" height="300" rx="14" fill="url(#glow)"/>

  <rect x="40" y="40" width="44" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="40" y="78" fill="#ffffff" font-size="22" font-weight="800">Tech Stack</text>

  <g font-size="17">
    <text x="40"  y="132" fill="#56c6ff" font-weight="700">Frontend</text>
    <text x="190" y="132" fill="#cfe0f0">TypeScript · React · Next.js · Tailwind</text>

    <text x="40"  y="176" fill="#56c6ff" font-weight="700">Backend</text>
    <text x="190" y="176" fill="#cfe0f0">Node · NestJS</text>

    <text x="40"  y="220" fill="#56c6ff" font-weight="700">Data</text>
    <text x="190" y="220" fill="#cfe0f0">PostgreSQL · Supabase</text>

    <text x="40"  y="264" fill="#56c6ff" font-weight="700">Infra</text>
    <text x="190" y="264" fill="#cfe0f0">AWS · Docker · Vercel · Cloudflare</text>
  </g>

  <text x="844" y="180" fill="#1f6feb" font-size="80" font-weight="800" text-anchor="end" opacity="0.13">&lt;/&gt;</text>
</svg>
