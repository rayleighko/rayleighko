<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#111b27"/>
      <stop offset="100%" stop-color="#0a2330"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb6a8"/>
      <stop offset="100%" stop-color="#56c6ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="16" fill="url(#glow)"/>

  <rect x="64" y="74" width="52" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="64" y="116" fill="#56c6ff" font-size="19" font-weight="700" letter-spacing="3">SOFTWARE ENGINEER</text>

  <text x="62" y="184" fill="#ffffff" font-size="60" font-weight="800" letter-spacing="-1">Ray · MyungJin Ko</text>

  <text x="64" y="224" fill="#9fb3c8" font-size="23">I build and operate what I ship — adapting to the stack the problem needs.</text>

  <g font-size="18" font-weight="600">
    <g transform="translate(64,256)"><rect width="118" height="34" rx="17" fill="#16212e" stroke="#2b3b4d"/><text x="59" y="23" fill="#cfe0f0" text-anchor="middle">TypeScript</text></g>
    <g transform="translate(194,256)"><rect width="138" height="34" rx="17" fill="#16212e" stroke="#2b3b4d"/><text x="69" y="23" fill="#cfe0f0" text-anchor="middle">React / Next.js</text></g>
    <g transform="translate(344,256)"><rect width="146" height="34" rx="17" fill="#16212e" stroke="#2b3b4d"/><text x="73" y="23" fill="#cfe0f0" text-anchor="middle">Node / NestJS</text></g>
    <g transform="translate(502,256)"><rect width="160" height="34" rx="17" fill="#16212e" stroke="#2b3b4d"/><text x="80" y="23" fill="#cfe0f0" text-anchor="middle">Builds &amp; Operates</text></g>
    <g transform="translate(674,256)"><rect width="104" height="34" rx="17" fill="#16212e" stroke="#2b3b4d"/><text x="52" y="23" fill="#cfe0f0" text-anchor="middle">AI-native</text></g>
    <g transform="translate(790,256)"><rect width="98" height="34" rx="17" fill="#16212e" stroke="#2b3b4d"/><text x="49" y="23" fill="#cfe0f0" text-anchor="middle">Polyglot</text></g>
  </g>

  <text x="1136" y="112" fill="#6b8299" font-size="18" text-anchor="end">Seoul, South Korea</text>
  <text x="1140" y="232" fill="#1f6feb" font-size="120" font-weight="800" text-anchor="end" opacity="0.16">&lt;/&gt;</text>
</svg>
